<!DOCTYPE html>
<html lang="en">
<head>
  <title>Videogame Search</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>

<body>
  
<!--MINÄSISÄLTÖ JA LINKIT-->
<div class="p-5 text-white text-center" style="background-color: turquoise;">
  <h1>My videogame blog</h1>
  <p>In this website I introduce interesting and fun videogames.</p>
</div>

<nav class="navbar navbar-expand-sm bg-dark navbar-dark">
  <div class="container-fluid">
    <ul class="navbar-nav">

      <li class="nav-item">
        <a class="nav-link active" href="index.html">Front page</a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="about.html">About me</a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="search.html">Search engine</a>
      </li>

    </ul>
  </div>
</nav>

<!--VIDEOPELIHAKU-->
<div class="container mt-5">
<h2>Search videogames</h2>
  <div class="input-group mb-4">
   <input type="text" id="searchInput" class="form-control" placeholder="Search a videogame">
    <button class="btn btn-dark" onclick="searchGames()">Search</button>
      </div>
  <div class="row" id="results"></div>
</div>


<script>
//RAWG API:n avain
  const API_KEY = "751cd4fc0709442ab6ca80e2a74d386e";
    async function searchGames(){
    const query = document.getElementById("searchInput").value;
    const url = `https://api.rawg.io/api/games?key=${API_KEY}&search=${query}`;
    const response = await fetch(url);
    const data = await response.json();
    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";
    data.results.forEach(game => {
      const col = document.createElement("div");
    
  //Bootstrap-kortti jokaiselle pelille
    col.className = "col-md-4 mb-4";
    col.innerHTML = `
      <div class="card h-100">
        <img src="${game.background_image}" class="card-img-top">
        <div class="card-body">
          <h5 class="card-title">${game.name}</h5>
          <p>
          ⭐ Metacritic: ${game.metacritic ?? "N/A"}<br>
          📅 Released: ${game.released ?? "Unknown"}
          </p>

          <p id="publisher-${game.id}">Loading publisher...</p>
          <button class="btn btn-primary btn-sm"
          onclick="loadScreenshots(${game.id})">
          Show screenshots
          </button>
          <div id="screens-${game.id}" class="mt-2"></div>
        </div>
      </div>
    `;
    resultsDiv.appendChild(col);
    loadPublisher(game.id);
  });

}

//Lataa julkaisijan ja näyttää sen kortissa
async function loadPublisher(gameId){
  const url = `https://api.rawg.io/api/games/${gameId}?key=${API_KEY}`;
  const response = await fetch(url);
  const data = await response.json();
  const publisher = data.publishers?.map(p => p.name).join(", ") ?? "Unknown";
  document.getElementById(`publisher-${gameId}`).innerHTML =
    "🏢 Publisher: " + publisher;

}

//Lataa kuvat ja näyttää ne kortissa
async function loadScreenshots(gameId){
  const container = document.getElementById(`screens-${gameId}`);
  const url = `https://api.rawg.io/api/games/${gameId}/screenshots?key=${API_KEY}`;
  const response = await fetch(url);
  const data = await response.json();
  container.innerHTML = "";
  data.results.slice(0,4).forEach(img => {
    container.innerHTML +=
      `<img src="${img.image}" style="width:80px; margin:2px;">`;
  });

}
</script>

</body>
</html>
